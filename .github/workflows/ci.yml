name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref when a new commit lands —
# saves Actions minutes and keeps the status checks current.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt the action-runner runtime (actions/checkout, actions/setup-*) into
# Node 24 ahead of GitHub's forced cutover. Separate from the Node/Python
# versions we pin below for our own commands.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  worker:
    name: Worker typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 LTS. wrangler 4 + tsc only need a current LTS; this
          # keeps CI on a supported, reproducible runtime.
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        # = wrangler types && tsc --noEmit. `wrangler types` is local codegen
        # from wrangler.jsonc — no Cloudflare auth or network required.
        run: npm run check

  python:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Floor of the project's requires-python (>=3.10).
          python-version: '3.10'

      # Install ONLY the light `test` extra — deliberately not `pip install .`,
      # which would drag in the full heavy dep tree (boto3/goose3/pandas/scipy +
      # the kokoro wheel-URL pin) and make CI slow and flaky. The suite is
      # hermetic: the heavy seams (TTS backends, ffmpeg, scraping, AWS) are
      # mocked in tests/conftest.py, so this minimal set is all pytest needs.
      # Mirrors the `test` extra in pyproject.toml (listed explicitly so this
      # works on 3.10, which predates tomllib).
      - name: Install test dependencies
        run: pip install pytest colorama python-dotenv nltk

      # Byte-compile keeps the cheap syntax floor over the whole CLI + poller
      # (most of which the hermetic suite doesn't import), then run the suite.
      - name: Byte-compile (syntax check)
        run: python -m compileall vox_biblios poller

      - name: Run tests
        run: python -m pytest
